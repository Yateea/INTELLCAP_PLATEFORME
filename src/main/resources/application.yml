server:
  port: 8084

spring:
  application:
    name: apply-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/apply_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  open-in-view: false

jwt:
  secret: ${JWT_SECRET:intellcap_secret_key_2024_very_long_string}
  expiration: 86400000