version: '3.8'

services:
  apply-db:
    image: postgres:15-alpine
    container_name: apply_db
    environment:
      POSTGRES_DB: apply_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - apply_db_data:/var/lib/postgresql/data
    networks:
      - intellcap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  apply-service:
    build: .
    container_name: apply_service
    ports:
      - "8094:8084"
    environment:
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: intellcap_secret_key_2024_very_long_string
      SPRING_DATASOURCE_URL: jdbc:postgresql://apply-db:5432/apply_db
    depends_on:
      apply-db:
        condition: service_healthy
    networks:
      - intellcap-network

volumes:
  apply_db_data:

networks:
  intellcap-network:
    driver: bridge